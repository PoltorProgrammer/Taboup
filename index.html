<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f2027">
    <title>Taboup - El juego de las palabras prohibidas</title>
    <meta name="description"
        content="Taboup es un party game por equipos inspirado en el clásico Tabú. Haz que tu equipo adivine palabras sin usar las palabras prohibidas.">
    <link rel="icon" type="image/png" href="./data/images/taboup_logo.png">

    <!-- Hojas de estilo modulares -->
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/header.css">
    <link rel="stylesheet" href="./css/initial-screen.css">
    <link rel="stylesheet" href="./css/game-area.css">
    <link rel="stylesheet" href="./css/review.css">
    <link rel="stylesheet" href="./css/modals.css">
    <link rel="stylesheet" href="./css/animations.css">
    <link rel="stylesheet" href="./css/lang-selector.css">
    <link rel="stylesheet" href="./css/responsive.css">

    <!-- Librería para procesar Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="game-container">
        <!-- Header con timer y pausa -->
        <div class="header">
            <div class="timer-container">
                <div class="timer-display" id="timer">--:--</div>
                <button class="btn-pause" id="pause-btn" title="Pausa (Espacio)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Modal de ajustes -->
        <div class="settings-overlay" id="settings-overlay">
            <div class="settings-modal">
                <button class="btn-close" id="close-settings">✕</button>
                <div class="settings-header">
                    <div class="settings-title" data-i18n="settings_title">⚙️ CONFIGURACIÓN</div>
                </div>
                <div class="settings-content">
                    <div class="setting-item">
                        <label data-i18n="settings_lang">Idioma</label>
                        <div class="lang-options-grid">
                            <div class="lang-option-card" data-lang="es">
                                <img src="./data/images/flags/flag_es.png" alt="es">
                                <span>Español</span>
                            </div>
                            <div class="lang-option-card" data-lang="en">
                                <img src="./data/images/flags/flag_en.png" alt="en">
                                <span>English</span>
                            </div>
                            <div class="lang-option-card" data-lang="ca">
                                <img src="./data/images/flags/flag_ca.png" alt="ca">
                                <span>Català</span>
                            </div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label data-i18n="settings_time">Tiempo base (segundos)</label>
                        <div class="time-input-container">
                            <button class="time-btn" id="time-minus" aria-label="Decrease time">−</button>
                            <input type="number" id="base-time-input" min="40" max="300" step="5" value="60">
                            <button class="time-btn" id="time-plus" aria-label="Increase time">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="initial-screen" id="initial-screen">
            <!-- Botón de ajustes - Solo disponible aquí -->
            <button class="settings-btn" id="settings-btn" title="Ajustes">⚙️</button>

            <div class="title-container">
                <img src="./data/images/taboup_logo.png" alt="Taboup Logo" class="game-logo">
                <div class="title">TABOUP</div>
                <div class="subtitle" data-i18n="subtitle">El juego de las palabras prohibidas</div>
            </div>
            <div class="start-buttons">
                <button class="btn btn-primary" id="start-60">
                    <div class="btn-content">
                        <div class="btn-title" data-i18n="new_round">NUEVA RONDA</div>
                        <div class="btn-subtitle" data-i18n="seconds_val" id="subtitle-60">60 segundos</div>
                    </div>
                </button>
                <button class="btn btn-secondary" id="start-120">
                    <div class="btn-content">
                        <div class="btn-title" data-i18n="long_round">⏱️ RONDA LARGA</div>
                        <div class="btn-subtitle" data-i18n="seconds_val" id="subtitle-120">120 segundos</div>
                    </div>
                </button>
            </div>
            <div class="extra-buttons">
                <button class="btn btn-info" id="show-map">
                    <div class="btn-content">
                        <div class="btn-title" data-i18n="view_map">🗺️ VER MAPA</div>
                        <div class="btn-subtitle" data-i18n="game_board">Tablero de juego</div>
                    </div>
                </button>
                <button class="btn btn-info" id="show-rules">
                    <div class="btn-content">
                        <div class="btn-title" data-i18n="rules">📋 REGLAS</div>
                        <div class="btn-subtitle" data-i18n="how_to_play">Cómo jugar</div>
                    </div>
                </button>
            </div>
        </div>

        <!-- Área de juego -->
        <div class="game-area" id="game-area">
            <!-- Layout para desktop: cartas descartadas a la izquierda -->
            <div class="discarded-area desktop-only">
                <div class="discarded-cards" id="discarded-cards-desktop"></div>
            </div>

            <!-- Área principal de juego -->
            <div class="main-game-area">
                <!-- Cartas descartadas para móvil: entre timer y carta principal -->
                <div class="discarded-area mobile-only">
                    <div class="discarded-cards horizontal" id="discarded-cards-mobile"></div>
                </div>

                <!-- Carta central y controles -->
                <div class="card-game-section">
                    <!-- Carta actual -->
                    <div class="card-container">
                        <div class="card-deck">
                            <div class="card card-shadow"></div>
                            <div class="card card-shadow" id="next-card"></div>
                            <div class="card card-current" id="current-card">
                                <div class="card-word" id="card-word" data-i18n="loading">Cargando...</div>
                                <div class="card-separator"></div>
                                <div class="card-forbidden-list" id="card-forbidden"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Controles del juego -->
                    <div class="game-controls">
                        <button class="control-btn error-btn" id="error-btn" title="Error (X)">
                            <div class="btn-icon">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </div>
                        </button>
                        <button class="control-btn correct-btn" id="correct-btn" title="Correcto (C)">
                            <div class="btn-icon">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                        </button>
                        <button class="control-btn pass-btn" id="pass-btn" title="Pasar (P)">
                            <div class="btn-icon">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="4" y1="12" x2="20" y2="12"></line>
                                    <polyline points="13 5 20 12 13 19"></polyline>
                                </svg>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pantalla de revisión -->
        <div class="review-area" id="review-area">
            <div class="review-container">
                <div class="review-header">
                    <div class="review-title" id="review-title" data-i18n="review_title_time">¡RONDA TERMINADA!</div>
                </div>

                <!-- Botones de nueva ronda -->
                <div class="review-buttons">
                    <button class="btn btn-primary" id="new-round-60">
                        <div class="btn-content">
                            <div class="btn-title" data-i18n="new_round">🆕 NUEVA RONDA</div>
                            <div class="btn-subtitle" data-i18n="seconds_val" id="review-subtitle-60">60 segundos</div>
                        </div>
                    </button>
                    <button class="btn btn-secondary" id="new-round-120">
                        <div class="btn-content">
                            <div class="btn-title" data-i18n="long_round">⏱️ RONDA LARGA</div>
                            <div class="btn-subtitle" data-i18n="seconds_val" id="review-subtitle-120">120 segundos
                            </div>
                        </div>
                    </button>
                </div>

                <div class="review-content">
                    <div class="review-summary" id="review-summary"></div>
                </div>
            </div>
        </div>

        <!-- Pantalla de mapa -->
        <div class="map-screen" id="map-screen">
            <div class="map-container">
                <div class="map-header">
                    <div class="map-title" data-i18n="map_title">🗺️ MAPA DEL JUEGO</div>
                    <button class="btn-close" id="close-map">✕</button>
                </div>
                <div class="map-content">
                    <img src="https://raw.githubusercontent.com/PoltorProgrammer/Taboup/refs/heads/main/images/tablero_Taboup.png"
                        alt="Tablero Taboup" class="map-image">
                </div>
                <div class="map-download">
                    <button class="download-btn" id="download-map-btn" data-i18n="download_map">
                        💾 DESCARGAR MAPA
                    </button>
                </div>
            </div>
        </div>

        <!-- Pantalla de reglas -->
        <div class="rules-screen" id="rules-screen">
            <div class="rules-container">
                <div class="rules-header">
                    <div class="rules-title" data-i18n="rules_title">📋 REGLAS DEL JUEGO</div>
                    <button class="btn-close" id="close-rules">✕</button>
                </div>
                <div class="rules-content" id="rules-content-body">
                    <!-- Las reglas se cargan dinámicamente desde rules.md -->
                    <p style="text-align: center; padding: 20px;" data-i18n="loading_rules">Cargando reglas del juego...
                    </p>
                </div>
            </div>
        </div>

        <!-- Animación de ERROR en el juego -->
        <div class="game-error-animation" id="game-error-animation">
            <div class="error-flash"></div>
            <div class="error-text-big" data-i18n="error_title">¡ERROR!</div>
            <div class="error-subtitle" data-i18n="error_subtitle">Ronda terminada</div>
        </div>

        <!-- Animación de TIEMPO en el juego -->
        <div class="game-time-animation" id="game-time-animation">
            <div class="time-flash"></div>
            <div class="time-text-big" data-i18n="time_title">¡TIEMPO!</div>
            <div class="time-subtitle" data-i18n="time_subtitle">Ronda terminada</div>
        </div>

        <!-- Modal de error técnico -->
        <div class="error-overlay" id="error-overlay">
            <div class="error-modal">
                <div class="error-icon">⚠️</div>
                <div class="error-text" id="error-text"></div>
                <button class="error-close" id="error-close" data-i18n="error_close">Entendido</button>
            </div>
        </div>

        <!-- Indicador de carga -->
        <div class="loading-overlay" id="loading-overlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" data-i18n="loading_cards">Cargando cartas...</div>
        </div>

    </div>

    <!-- Script como módulo ES6 -->
    <script type="module" src="./js/main.js"></script>
</body>

</html>
